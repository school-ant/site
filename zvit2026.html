<!DOCTYPE html>
<html lang="uk">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Звіт завідувача філії за 2025-2026 навчальні роки">
	<meta name="theme-color" content="#333333">
	<link rel="canonical" href="https://school-ant.github.io/site/zvit2026.html">
	<meta property="og:title" content="Звіт завідувача філії - Антипівська гімназія">
	<meta property="og:description" content="Звіт завідувача філії за 2025-2026 навчальні роки">
	<meta property="og:type" content="article">
	<meta property="og:url" content="https://school-ant.github.io/site/zvit2026.html">
	<meta property="og:image" content="https://school-ant.github.io/site/images/logo.avif">
	<title>Звіт завідувача філії - Антипівська гімназія</title>
	<link rel="icon" href="images/favicon.ico" sizes="any">
	<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
	<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
	<link rel="manifest" href="site.webmanifest">
	<link rel="stylesheet" href="style.css">
	<style>
		.documentPage {
			max-width: 960px;
			margin: 0 auto;
			padding: 32px 16px 56px;
		}

		.documentPaper {
			background: #fff;
			border: 1px solid rgba(0, 0, 0, 0.08);
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
			padding: clamp(24px, 5vw, 56px);
		}

		.documentPaper h1,
		.documentPaper h2,
		.documentPaper h3 {
			text-align: center;
		}

		.documentPaper p {
			margin: 0 0 14px;
			line-height: 1.65;
		}

		.documentPaper ul,
		.documentPaper ol {
			line-height: 1.65;
		}

		.documentStatus {
			margin: 0;
			color: #555;
		}
	</style>
</head>

<body>
	<header class="siteHeaderBar" role="banner">
		<a href="index.html" aria-label="Перейти на головну сторінку">
			<img src="images/logo.avif" alt="Логотип школи" width="96" height="96" loading="eager" decoding="async">
			<hgroup>
				<h1>Антипівська гімназія</h1>
				<h2>з дошкільним підрозділом</h2>
			</hgroup>
		</a>
		<nav aria-label="Основна навігація">
			<ul>
				<li><a href="index.html">Головна</a></li>
				<li><a href="about.html">Про школу</a></li>
				<li><a href="news.html">Новини</a></li>
				<li><a href="activity.html">Діяльність закладу освіти</a></li>
				<li><a href="transparency.html">Прозорість</a></li>
				<li><a href="parents.html">Батькам</a></li>
				<li><a href="preschool.html">Дошкільний підрозділ</a></li>
				<li><a href="contact.html">Контакти</a></li>
			</ul>
		</nav>
	</header>

	<main class="documentPage">
		<article class="documentPaper" id="documentContent">
			<p class="documentStatus">Завантаження документа...</p>
		</article>
	</main>

	<div class="siteFooter">
		<footer>
			<p>&copy; <span id="currentYear">2026</span> Шкільний сайт. Усі права захищено.</p>
			<script>document.getElementById("currentYear").textContent = new Date().getFullYear();</script>
		</footer>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
	<script>
		const content = document.getElementById("documentContent");

		fetch("docs/zvit2026.docx")
			.then((response) => {
				if (!response.ok) {
					throw new Error("Document not found");
				}
				return response.arrayBuffer();
			})
			.then((arrayBuffer) => mammoth.convertToHtml({ arrayBuffer }))
			.then((result) => {
				content.innerHTML = result.value;
			})
			.catch(() => {
				content.innerHTML = '<p class="documentStatus">Документ тимчасово недоступний для перегляду.</p>';
			});
	</script>
</body>

</html>
